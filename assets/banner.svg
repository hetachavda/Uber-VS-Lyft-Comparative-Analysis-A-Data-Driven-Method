<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87ba4"/>
      <stop offset="100%" stop-color="#2a78d6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <g stroke="#3a5a68" stroke-width="1" opacity="0.25">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- right-side motif: head-to-head fare bars (Uber vs Lyft) grow from baseline y=250 -->
  <g filter="url(#glow)">
    <!-- Uber (blue) shorter = cheaper -->
    <rect x="830" width="46" rx="5" fill="#2a78d6" y="250" height="0">
      <animate attributeName="y" values="250;168" begin="0.3s" dur="0.8s" fill="freeze"/>
      <animate attributeName="height" values="0;82" begin="0.3s" dur="0.8s" fill="freeze"/>
    </rect>
    <!-- Lyft (magenta) taller = pricier -->
    <rect x="892" width="46" rx="5" fill="#e87ba4" y="250" height="0">
      <animate attributeName="y" values="250;140" begin="0.5s" dur="0.8s" fill="freeze"/>
      <animate attributeName="height" values="0;110" begin="0.5s" dur="0.8s" fill="freeze"/>
    </rect>
    <!-- secondary pair -->
    <rect x="972" width="46" rx="5" fill="#5598e7" y="250" height="0">
      <animate attributeName="y" values="250;190" begin="0.7s" dur="0.8s" fill="freeze"/>
      <animate attributeName="height" values="0;60" begin="0.7s" dur="0.8s" fill="freeze"/>
    </rect>
    <rect x="1034" width="46" rx="5" fill="#f0a7c4" y="250" height="0">
      <animate attributeName="y" values="250;175" begin="0.9s" dur="0.8s" fill="freeze"/>
      <animate attributeName="height" values="0;75" begin="0.9s" dur="0.8s" fill="freeze"/>
    </rect>
    <!-- baseline -->
    <line x1="815" y1="250" x2="1100" y2="250" stroke="#7fa9bd" stroke-width="1.5" opacity="0.5"/>
    <!-- value pops -->
    <text x="853" y="158" font-size="15" font-weight="700" fill="#9ec5f4" text-anchor="middle" opacity="0">
      $15.8<animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.5s" fill="freeze"/></text>
    <text x="915" y="130" font-size="15" font-weight="700" fill="#f0a7c4" text-anchor="middle" opacity="0">
      $17.4<animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.5s" fill="freeze"/></text>
  </g>

  <rect x="70" y="96" width="8" height="128" rx="4" fill="url(#accent)"/>
  <text x="105" y="128" font-size="44" font-weight="700" fill="#ffffff">Uber vs Lyft — Data-Driven Showdown</text>
  <text x="105" y="172" font-size="23" font-weight="400" fill="#f6cfe0">Comparative Analysis of Ride-Sharing Pricing &amp; Demand</text>

  <g font-size="16" font-weight="600">
    <rect x="105" y="200" width="150" height="34" rx="17" fill="#e87ba4" opacity="0.9"/>
    <text x="180" y="223" fill="#0b0b0b" text-anchor="middle">~650K Rides</text>
    <rect x="267" y="200" width="160" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="347" y="223" fill="#cfeefc" text-anchor="middle">4 Stat Tests</text>
    <rect x="439" y="200" width="180" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="529" y="223" fill="#cfeefc" text-anchor="middle">Boston 2018</text>
  </g>

  <text x="105" y="285" font-size="15" fill="#7fa9bd">Python · Pandas · Seaborn · Statistical Testing   |   Heta Chavda — Data Analytics Portfolio</text>

  <rect x="-260" y="0" width="260" height="320" fill="url(#shine)" transform="skewX(-20)">
    <animate attributeName="x" from="-260" to="1300" dur="4.5s" begin="1.6s" repeatCount="indefinite"/>
  </rect>
</svg>
